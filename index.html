<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de La bestia</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="container">
        <form id="registrationForm">
            <h2>Formulario Registro</h2>

            <label for="username">Nombre de usuario</label>
            <input type="text" id="username" required minlength="4" title="El nombre de usuario debe tener al menos 4 caracteres">

            <label for="email">Correo electrónico</label>
            <input type="email"  id="email"  required>
            
            <label for="password">Contraseña</label>
            <input  type="password"  id="password"  required  pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$" title="La contraseña debe tener mínimo 8 caracteres, incluyendo letras y números">

            <button type="submit">Registrarme</button>

            <div id="message"></div>
        </form>
    </div>

    <script src="scripts/scripts.js"></script>
</body>
</html>
